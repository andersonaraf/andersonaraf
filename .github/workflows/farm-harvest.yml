name: Generate Farm Harvest

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Update monthly farm harvest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate farm harvest SVG
        run: python scripts/generate_farm_harvest.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: andersonaraf

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
